name: Run the tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    strategy:
        fail-fast: false             #nastaveni strategie pro beh testu, fail-fast: false zajistuje, ze se vsechny shardy spusti i v pripade, ze nektery z nich selze, coz umoznuje ziskat kompletní obraz o stavu testu a identifikovat vsechny problemy bez ohledu na poradi spusteni
        matrix:
          shard: [1, 2, 3, 4]   #definice matice pro rozdeleni testu do ctyr shardu, kazdy shard bude obsahovat urcitou cast testu pro paralelni beh a zrychleni testovani
    runs-on: ubuntu-latest

    steps:
      - name: Check out project
        uses: actions/checkout@v5     #checkout projektu z repozitare a jeho zkopirovani do pracovniho adresare pro dalsi kroky

      - name: Install Node.js
        uses: actions/setup-node@v6   #instalace Node.js pro beh testu a puziva akci setup-node, ktera umoznuje nastavit verzi Node.js pro dalsi kroky
        with:
          node-version: "18"

      - name: Clean install the project
        run: npm ci                           #cista instalace zavislosti projektu z package-lock.json, ktera zajistuje konzistentni instalaci a rychlejsi beh testu

      - name: Install Playwright
        run: npx playwright install          #instalace Playwrightu

      - name: Run Playwright tests
        env:
            SLACK_BOT_USER_OAUTH_TOKEN: ${{ secrets.SLACK_BOT_USER_OAUTH_TOKEN }}
        run: npx playwright test --grep-invert @api --shard ${{ matrix.shard }}/4                      #spusteni Playwright testu 

      - uses: actions/upload-artifact@v7
        if: always()                         #nahrani vysledku testu jako artefakt pro dalsi analyzu, pouziva se akce upload-artifact a podminka always() zajistuje, ze se tento krok provede i v pripade nezdaru testu  
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload blob report to GitHub Actions Artifacts
        if: always()                         #nahrani blob reportu jako artefakt pro dalsi analyzu, pouziva se akce upload-artifact a podminka always() zajistuje, ze se tento krok provede i v pripade nezdaru testu
        uses: actions/upload-artifact@v4
        with:
          name: all-blob-reports -${{ matrix.shard }}
          path: blob-report
          retention-days: 1    

  merge-reports:
    if: always()
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@v5
        with:
          path: all-blob-reports
          pattern: blob-report-*

      - name: Merge into HTML Report
        run: npx playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: html-report--attempt-${{ github.run_attempt }}
          path: playwright-report
          retention-days: 14
